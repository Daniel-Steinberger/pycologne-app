<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="PyCologne — die Python User Group Köln. Monatliche Treffen, Vorträge, Diskussionen rund um Python.">
    <meta name="theme-color" content="#facc15" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#ca8a04" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <title>{% block title %}PyCologne{% endblock %}</title>
    <link href="/static/css/pycologne.css" rel="stylesheet">
  </head>
  <body>
    <a href="#main" class="skip-link">Zum Inhalt springen</a>

    <header class="site-header">
      <div class="container site-header__inner">
        <a class="brand" href="/" aria-label="PyCologne — Startseite">
          <img class="brand__logo"
               src="/static/images/PyCologne-2012-Logo-web-horizontal.svg"
               alt=""
               width="160" height="44">
          <span class="brand__text">PyCologne</span>
        </a>

        <nav class="primary-nav" aria-label="Hauptnavigation">
          <ul>
            {% for href, caption in get_topmenue() %}
            <li>
              <a href="{{ href }}"{% if href[1:] == act %} aria-current="page"{% endif %}>{{ caption }}</a>
            </li>
            {% endfor %}
          </ul>
        </nav>
      </div>
    </header>

    <main id="main" class="site-main">
      {% block body %}{% endblock %}
    </main>

    {% include "footer.html" %}
  </body>
</html>
